<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brainforge.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f7f4" media="(prefers-color-scheme: light)" />
    <title>BrainForge</title>
    <script>
      // Apply dark mode class before first paint to prevent FOUC
      (function () {
        var theme = localStorage.getItem("theme");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.replace("light", "dark");
        }
      })();
    </script>
    <style>
      /* Inline critical colors so background is correct before Tailwind loads */
      html { background-color: #f8f7f4; }
      html.dark { background-color: #09090b; }
      /* Show a spinner while React hasn't mounted yet */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 2px solid rgba(128, 128, 128, 0.2);
        border-top-color: rgba(128, 128, 128, 0.6);
        animation: _sp 0.8s linear infinite;
      }
      @keyframes _sp { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
